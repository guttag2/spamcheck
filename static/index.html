<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Spam Checker</title>
</head>
<body>
feature/ui-title
    <h1>스팸 분별기</h1>
  
    <h1>스팸 체커</h1>
 main

    <textarea id="text" rows="5" cols="60"
        placeholder="스팸으로 의심되는 문자 넣기"></textarea><br><br>

    <button onclick="classify()">스팸 탐지</button>
    <h3 id="result"></h3>

    <script>
        function classify() {
            const text = document.getElementById("text").value;

            fetch("/classify", {
                method: "POST",
                body: JSON.stringify({text})
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("result").innerText =
                    "결과: " + data.label + " (score=" + data.score + ")";
            })
            .catch(() => {
                document.getElementById("result").innerText = "에러 발생";
            });
        }
    </script>
</body>
</html>
